<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartTech Computers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    body {
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #000;
      color: white;
      padding: 20px 50px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 {
      font-size: 32px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 25px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    nav ul li a:hover {
      color: #00aaff;
    }

    section {
      padding: 80px 60px;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #0044aa, #000);
      color: white;
      text-align: center;
      flex-direction: column;
    }

    .hero h2 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 22px;
      max-width: 700px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 35px;
      background: white;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00aaff;
      color: white;
    }

    .title {
      text-align: center;
      margin-bottom: 50px;
    }

    .title h2 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .products-grid,
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card-image {
      height: 220px;
      background: linear-gradient(to right, #222, #555);
    }

    .card-content {
      padding: 25px;
    }

    .card-content h3 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .price {
      color: #0066ff;
      font-size: 26px;
      font-weight: bold;
      margin: 15px 0;
    }

    .service-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .service-box:hover {
      background: #000;
      color: white;
    }

    .service-box h3 {
      margin: 20px 0;
      font-size: 28px;
    }

    .about {
      background: #000;
      color: white;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 50px;
      align-items: center;
    }

    .stats {
      background: #111;
      padding: 40px;
      border-radius: 20px;
    }

    .stats div {
      margin: 20px 0;
      display: flex;
      justify-content: space-between;
      font-size: 22px;
    }

    .contact-form {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      max-width: 800px;
      margin: auto;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    footer {
      background: black;
      color: white;
      text-align: center;
      padding: 25px;
      font-size: 18px;
    }

    @media(max-width: 768px) {
      nav {
        flex-direction: column;
        gap: 20px;
      }

      .hero h2 {
        font-size: 40px;
      }

      section {
        padding: 60px 25px;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav>
      <h1>SmartTech Computers</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- HOME PAGE -->
<!-- Save this file as index.html -->
  <section class="hero" id="home">
    <h2>Intelligent Computer Marketplace</h2>
    <p>
      Buy powerful laptops, gaming PCs, accessories, and smart technology solutions from the future.
    </p>
    <button class="btn">Shop Now</button>
  </section>

  

  <footer>
    © 2026 SmartTech Computers — Intelligent Technology Marketplace
  </footer>

</body>
</html>
